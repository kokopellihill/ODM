<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CN ODM">
<meta name="theme-color" content="#0F0E17">
<title>CN Cosmetic ODM</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0E17;--surface:#1A1828;--card:#211F31;--border:#2E2C42;
  --accent:#C8A96E;--purple:#7C6FCD;--text:#EAE6F0;--muted:#7A7590;
  --blue:#4FC3F7;--green:#66BB6A;--orange:#FFA726;--red:#EF5350;
  --mono:'DM Mono',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding-bottom:72px}

/* 헤더 */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-title{font-size:14px;font-weight:700}
.hdr-sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-date{font-size:11px;color:var(--muted);font-family:var(--mono)}
.btn-cfg{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);font-size:11px;cursor:pointer}

/* 탭 */
.tabs{display:flex;gap:4px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;position:sticky;top:53px;z-index:99;background:var(--bg)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.tab.on{background:var(--purple);border-color:var(--purple);color:#fff}

/* 패널 */
.panel{display:none;padding:0 14px}.panel.on{display:block}

/* 섹션 타이틀 */
.stitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;border-left:3px solid var(--purple)}
.kpi.blue{border-left-color:var(--blue)}.kpi.green{border-left-color:var(--green)}.kpi.orange{border-left-color:var(--orange)}.kpi.gold{border-left-color:var(--accent)}
.kpi.wide{grid-column:span 2}
.kpi-lbl{font-size:10px;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1}
.kpi-unit{font-size:10px;color:var(--muted);margin-top:4px}

/* 경고 */
.alert-list{display:flex;flex-direction:column;gap:6px}
.alert{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red);box-shadow:0 0 6px var(--red)}.dot-orange{background:var(--orange)}.dot-yellow{background:#FFD54F}
.alert-txt{flex:1;font-size:12px}
.alert-cnt{font-family:var(--mono);font-size:16px;font-weight:700}
.cnt-red{color:var(--red)}.cnt-orange{color:var(--orange)}.cnt-zero{color:var(--muted)}

/* 생산 카드 */
.prod-list{display:flex;flex-direction:column;gap:8px}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.prod-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.prod-so{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--surface);padding:2px 7px;border-radius:4px}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px}
.b-blue{background:rgba(79,195,247,.15);color:var(--blue)}.b-orange{background:rgba(255,167,38,.15);color:var(--orange)}
.b-red{background:rgba(239,83,80,.15);color:var(--red)}.b-green{background:rgba(102,187,106,.15);color:var(--green)}.b-gray{background:rgba(122,117,144,.15);color:var(--muted)}
.prod-name{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:6px}
.prod-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
.prog{height:3px;background:var(--border);border-radius:2px;margin:10px 0;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--purple);transition:width .6s}
.prog-fill.done{background:var(--green)}.prog-fill.delay{background:var(--red)}
.prod-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.due-date{color:var(--text);font-family:var(--mono);font-weight:500}
.due-urgent .due-date{color:var(--orange)}.due-overdue .due-date{color:var(--red)}
.prod-parts{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.7}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
.tag-ok{background:rgba(102,187,106,.12);color:var(--green);border:1px solid rgba(102,187,106,.25)}
.tag-wait{background:rgba(255,167,38,.12);color:var(--orange);border:1px solid rgba(255,167,38,.25)}
.tag-bad{background:rgba(239,83,80,.12);color:var(--red);border:1px solid rgba(239,83,80,.25)}

/* 통계 */
.donut-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:20px;margin-bottom:8px}
.donut{width:80px;height:80px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
.donut-hole{width:54px;height:54px;background:var(--card);border-radius:50%;position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-num{font-size:18px;font-weight:700;font-family:var(--mono)}
.donut-sub{font-size:9px;color:var(--muted)}
.legend{flex:1}.legend-row{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:5px}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.bar-row{margin-bottom:8px}.bar-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .8s}
.stat-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.stat-val{font-family:var(--mono);font-size:13px;font-weight:500}

/* 가이드 */
.guide-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.guide-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px}
.guide-step{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6)}
.guide-title{font-size:13px;font-weight:700;color:#fff}
.guide-body{padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.7;white-space:pre-line}

/* 빈 상태 */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;padding:30px;gap:8px;color:var(--muted);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* FAB */
.fab{position:fixed;bottom:80px;right:16px;width:46px;height:46px;background:var(--purple);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(124,111,205,.4);cursor:pointer;border:none;z-index:200;transition:transform .15s}
.fab:active{transform:scale(.9)}

/* 바텀 내비 */
.bnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:150}
.bnav-btn{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);cursor:pointer;background:none;border:none;transition:color .2s}
.bnav-btn.on{color:var(--purple)}.bnav-icon{font-size:18px}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:440px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.modal-input{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.btn-save{flex:1;padding:10px;background:var(--purple);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-close{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer}
.modal-status{font-size:11px;margin-top:8px;text-align:center;min-height:16px}
.modal-divider{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.modal-hint{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px}
.modal-hint-body{font-size:11px;color:var(--muted);line-height:1.6}
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-dot"></div>
      <div>
        <div class="hdr-title">CN Cosmetic ODM</div>
        <div class="hdr-sub">영업통합관리시스템 v7.4</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="hdr-date" id="hdrDate">--</div>
      <button class="btn-cfg" onclick="showModal()">⚙️</button>
    </div>
  </header>

  <!-- 탭 -->
  <nav class="tabs">
    <button class="tab on" data-p="home">📊 대시보드</button>
    <button class="tab" data-p="prod">📋 생산현황</button>
    <button class="tab" data-p="stats">📈 통계</button>
    <button class="tab" data-p="guide">📖 가이드</button>
  </nav>

  <!-- 대시보드 패널 -->
  <div class="panel on" id="p-home">
    <div class="stitle">이번달 KPI</div>
    <div class="kpi-grid" id="kpiGrid"><div class="loading" style="grid-column:span 2"><div class="spinner"></div>로딩중</div></div>
    <div class="stitle" style="margin-top:20px">⚠️ 주의 필요</div>
    <div class="alert-list" id="alertList"><div class="loading"><div class="spinner"></div></div></div>
    <div class="stitle" style="margin-top:20px">📋 생산 진행중</div>
    <div class="prod-list" id="homeProdList"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- 생산현황 패널 -->
  <div class="panel" id="p-prod">
    <div class="stitle">전체 생산 목록</div>
    <div class="prod-list" id="fullProdList"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- 통계 패널 -->
  <div class="panel" id="p-stats">
    <div class="stitle">진행상태 분포</div>
    <div id="donutArea"><div class="loading"><div class="spinner"></div></div></div>
    <div class="stitle">제조사별 건수</div>
    <div id="makerArea"><div class="loading"><div class="spinner"></div></div></div>
    <div class="stitle">이번달 누적</div>
    <div id="monthArea"></div>
  </div>

  <!-- 가이드 패널 -->
  <div class="panel" id="p-guide">
    <div class="stitle">실무 입력 순서</div>
    <div id="guideArea"></div>
  </div>

</div>

<!-- FAB 새로고침 -->
<button class="fab" id="fabBtn">↺</button>

<!-- 바텀 내비 -->
<nav class="bnav">
  <button class="bnav-btn on" data-p="home"><span class="bnav-icon">📊</span>대시보드</button>
  <button class="bnav-btn" data-p="prod"><span class="bnav-icon">📋</span>생산</button>
  <button class="bnav-btn" data-p="stats"><span class="bnav-icon">📈</span>통계</button>
  <button class="bnav-btn" data-p="guide"><span class="bnav-icon">📖</span>가이드</button>
</nav>

<!-- GAS URL 설정 모달 -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">⚙️ GAS 연동 설정</div>
    <div class="modal-sub">Apps Script 배포 URL을 입력하면 실제 시트 데이터가 표시됩니다.<br><span style="color:var(--accent);font-size:11px">Apps Script → 배포 → 새 배포 → 웹 앱 → URL 복사</span></div>
    <input class="modal-input" id="urlInput" type="url" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-btns">
      <button class="btn-save" onclick="saveUrl()">저장 및 연동</button>
      <button class="btn-close" onclick="closeModal()">닫기</button>
    </div>
    <div class="modal-status" id="urlStatus"></div>
    <div class="modal-divider">
      <div class="modal-hint">📱 홈 화면 설치</div>
      <div class="modal-hint-body"><b style="color:var(--text)">iPhone:</b> Safari → 공유(□↑) → 홈 화면에 추가<br><b style="color:var(--text)">Android:</b> Chrome → ⋮ → 홈 화면에 추가</div>
    </div>
  </div>
</div>

<script>
'use strict';

// ── 설정 ──────────────────────────────────────────────
var GAS_URL = '';
try { GAS_URL = localStorage.getItem('odm_gas_url') || ''; } catch(e) {}

var _data = null;

// ── 유틸 ──────────────────────────────────────────────
function fmtDate(s) {
  if (!s || s === '미정') return s || '-';
  var d = new Date(s);
  if (isNaN(d)) return s;
  return (d.getMonth()+1) + '/' + d.getDate();
}

function dDay(s) {
  if (!s || s === '미정') return null;
  var d = new Date(s), n = new Date();
  n.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d-n)/86400000);
}

function statusBadge(s) {
  s = s || '⚪ 대기';
  if (s.includes('완료'))   return {cls:'b-green',  prog:100, pfx:'done'};
  if (s.includes('생산중')) return {cls:'b-blue',   prog:60,  pfx:''};
  if (s.includes('조제중')) return {cls:'b-orange', prog:30,  pfx:''};
  if (s.includes('지연'))   return {cls:'b-red',    prog:40,  pfx:'delay'};
  return {cls:'b-gray', prog:0, pfx:''};
}

function parseTags(str) {
  if (!str) return '';
  return str.split(/[\n,]/).map(function(p){
    p = p.trim();
    if (!p) return '';
    var cls = p.includes('🟢') ? 'tag-ok' : p.includes('🔴') ? 'tag-bad' : 'tag-wait';
    return '<span class="tag '+cls+'">'+p.replace(/^[🟢🟡🔴⚪]\s*/,'').substring(0,20)+'</span>';
  }).join('');
}

// ── 렌더 ──────────────────────────────────────────────
function renderKpi(d) {
  var k = d.kpi;
  document.getElementById('kpiGrid').innerHTML =
    kpiCard('이번달 수주', k.orderCount, '건', 'blue') +
    kpiCard('이번달 발주', k.purchaseCount, '건', 'orange') +
    kpiCard('이번달 출고', k.deliveryCount, '건', 'green') +
    kpiCard('생산 진행중', d.production.filter(function(p){return !p.status.includes('완료')}).length, '건', '') +
    '<div class="kpi wide gold"><div class="kpi-lbl">이번달 수주금액</div><div class="kpi-val" style="font-size:18px">'+k.orderAmount+'</div></div>';
}
function kpiCard(lbl, val, unit, cls) {
  return '<div class="kpi '+cls+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-unit">'+unit+'</div></div>';
}

function renderAlerts(d) {
  var a = d.alerts;
  var items = [
    {dot:'dot-red',    txt:'출고 누락 (수주확정 후 미출고)', cnt:a.missingDelivery, cc:'cnt-red'},
    {dot:'dot-orange', txt:'납기 초과 (납품완료 미처리)',    cnt:a.overdueDelivery, cc:'cnt-orange'},
    {dot:'dot-orange', txt:'미수금 30일 초과',               cnt:a.overduePayment,  cc:'cnt-orange'},
    {dot:'dot-yellow', txt:'미처리 클레임',                  cnt:a.openClaims,      cc:'cnt-zero'},
  ];
  document.getElementById('alertList').innerHTML = items.map(function(i){
    return '<div class="alert"><div class="alert-dot '+i.dot+'"></div><div class="alert-txt">'+i.txt+'</div><div class="alert-cnt '+(i.cnt>0?i.cc:'cnt-zero')+'">'+i.cnt+'</div></div>';
  }).join('');
}

function prodCardHTML(p, full) {
  var sb = statusBadge(p.status);
  var dd = dDay(p.due);
  var dueClass = dd===null?'': dd<0?'due-overdue': dd<=3?'due-urgent':'';
  var dueLabel = dd===null?'-': dd<0?'D+'+ Math.abs(dd)+' 초과': dd===0?'D-Day':'D-'+dd;
  var partsHTML = (full && p.parts) ?
    '<div class="prod-parts"><div style="font-size:10px;margin-bottom:4px">부자재 현황</div><div class="tags">'+parseTags(p.parts)+'</div></div>' : '';
  var bomHTML = (full && p.bom && p.bom !== 'BOM 미설정') ?
    '<div style="font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5">📦 '+p.bom+'</div>' : '';
  return '<div class="prod-card">'+
    '<div class="prod-top"><span class="prod-so">'+(p.soNo||'-')+'</span><span class="badge '+sb.cls+'">'+p.status+'</span></div>'+
    '<div class="prod-name">'+(p.product||'(제품명 미입력)')+'</div>'+
    '<div class="prod-meta"><span>🏭 '+(p.maker||'미정')+'</span><span>📦 '+(p.qty?Number(p.qty).toLocaleString()+'개':'-')+'</span>'+(p.bulk?'<span>'+p.bulk+'</span>':'')+'</div>'+
    partsHTML+bomHTML+
    '<div class="prog"><div class="prog-fill '+sb.pfx+'" style="width:'+sb.prog+'%"></div></div>'+
    '<div class="prod-footer"><div class="'+dueClass+'">납기 <span class="due-date">'+fmtDate(p.due)+' ('+dueLabel+')</span></div>'+
    (p.shipDate&&p.shipDate!=='미정'?'<div>출고예정 <span style="color:var(--blue)">'+fmtDate(p.shipDate)+'</span></div>':'')+'</div>'+
    '</div>';
}

function renderHome(d) {
  renderKpi(d);
  renderAlerts(d);
  var active = d.production.filter(function(p){return !p.status.includes('완료')});
  active.sort(function(a,b){
    var order={'지연':0,'생산중':1,'조제중':2,'대기':3};
    function key(p){ for(var k in order){ if(p.status.includes(k)) return order[k]; } return 9; }
    return key(a)-key(b);
  });
  var show = active.slice(0,3);
  document.getElementById('homeProdList').innerHTML = show.length ?
    show.map(function(p){return prodCardHTML(p,false)}).join('') :
    '<div class="empty">✅ 진행중인 생산 건이 없습니다</div>';
}

function renderProd(d) {
  var sorted = d.production.slice().sort(function(a,b){
    if(a.status.includes('완료')&&!b.status.includes('완료')) return 1;
    if(!a.status.includes('완료')&&b.status.includes('완료')) return -1;
    return new Date(a.due||0)-new Date(b.due||0);
  });
  document.getElementById('fullProdList').innerHTML = sorted.length ?
    sorted.map(function(p){return prodCardHTML(p,true)}).join('') :
    '<div class="empty">📋 등록된 생산 건이 없습니다<br><small style="margin-top:8px;display:block">생산일정표 세팅 후<br>수주번호를 입력해 주세요</small></div>';
}

function renderStats(d) {
  var prods = d.production, total = prods.length;
  if (!total) {
    document.getElementById('donutArea').innerHTML = '<div class="empty">📊 데이터 없음</div>';
    return;
  }
  var sc = {완료:0,생산중:0,조제중:0,지연:0,대기:0};
  prods.forEach(function(p){
    if(p.status.includes('완료')) sc['완료']++;
    else if(p.status.includes('생산중')) sc['생산중']++;
    else if(p.status.includes('지연')) sc['지연']++;
    else if(p.status.includes('조제중')) sc['조제중']++;
    else sc['대기']++;
  });
  function deg(n){ return Math.round(n/total*360); }
  var d0=deg(sc['완료']), d1=d0+deg(sc['생산중']), d2=d1+deg(sc['조제중']+sc['대기']), d3=d2+deg(sc['지연']);
  var grad='conic-gradient(var(--green) 0deg '+d0+'deg, var(--blue) '+d0+'deg '+d1+'deg, var(--orange) '+d1+'deg '+d2+'deg, var(--red) '+d2+'deg '+d3+'deg, var(--border) '+d3+'deg 360deg)';
  document.getElementById('donutArea').innerHTML =
    '<div class="donut-wrap"><div class="donut" style="background:'+grad+'"><div class="donut-hole"><div class="donut-num">'+total+'</div><div class="donut-sub">전체</div></div></div>'+
    '<div class="legend">'+
    ['완료','생산중','조제중+대기','지연'].map(function(k,i){
      var colors=['var(--green)','var(--blue)','var(--orange)','var(--red)'];
      var cnt = k==='조제중+대기'?sc['조제중']+sc['대기']:sc[k]||0;
      return '<div class="legend-row"><div class="ldot" style="background:'+colors[i]+'"></div>'+k+' '+cnt+'건</div>';
    }).join('')+'</div></div>';

  var makerMap = {};
  prods.forEach(function(p){ if(p.maker&&p.maker!=='미정') makerMap[p.maker]=(makerMap[p.maker]||0)+1; });
  var makers = Object.entries(makerMap).sort(function(a,b){return b[1]-a[1]}).slice(0,6);
  var maxM = makers[0]?makers[0][1]:1;
  document.getElementById('makerArea').innerHTML = makers.length ?
    '<div class="bar-wrap">'+makers.map(function(m){
      return '<div class="bar-row"><div class="bar-top"><span>'+m[0]+'</span><span style="font-family:var(--mono)">'+m[1]+'건</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(m[1]/maxM*100)+'%"></div></div></div>';
    }).join('')+'</div>' : '<div class="empty" style="padding:20px">데이터 없음</div>';

  var k = d.kpi;
  document.getElementById('monthArea').innerHTML =
    statRow('📥 이번달 수주', k.orderCount+'건', 'var(--blue)') +
    statRow('📤 이번달 발주', k.purchaseCount+'건', 'var(--orange)') +
    statRow('🚚 이번달 출고', k.deliveryCount+'건', 'var(--green)') +
    statRow('💰 수주금액', k.orderAmount, 'var(--accent)');
}
function statRow(lbl, val, color) {
  return '<div class="stat-row"><div>'+lbl+'</div><div class="stat-val" style="color:'+color+'">'+val+'</div></div>';
}

function renderGuide() {
  var steps = [
    {step:'STEP 0',color:'#004D40',title:'마스터_원부자재',desc:'공급업체 등록 (최초 1회)\n원부자재코드 · 업체명 · 담당자 · 리드타임 입력'},

    {step:'STEP 2',color:'#1B5E20',title:'마스터_제품',desc:'신규 제품 등록 (브랜드사 의뢰 접수 시)\n필수: 제품명 · 유형코드 · 브랜드코드 · 제조사코드 · 규격'},
    {step:'STEP 3',color:'#B71C1C',title:'수주관리',desc:'주문 접수 시마다 입력\n필수 7개: 수주일 · 브랜드코드 · 제품코드 · 수량 · 납기일 · 상태 · 담당자'},
    {step:'STEP 4',color:'#E65100',title:'생산일정(통합)',desc:'생산 시작 시 수주번호 입력\nA열 수주번호 → C·D·E·F·J 자동\n수동: B진행상태 · G내용물상태 · H부자재현황 · I조립일정 · K비고'},
  ];
  document.getElementById('guideArea').innerHTML = steps.map(function(s){

      '<div class="guide-hdr" style="background:'+s.color+'"><span class="guide-step">'+s.step+'</span><span class="guide-title">'+s.title+'</span></div>'+
      '<div class="guide-body">'+s.desc+'</div></div>';
  }).join('') +
  '<div class="guide-card" style="margin-top:8px"><div class="guide-hdr" style="background:#37474F"><span class="guide-title">색상 범례</span></div>'+
  '<div class="guide-body">🟨 노란색 = 직접 입력 필수\n🟦 하늘색 = 자동연동 (건드리지 마세요)\n🟪 보라색 = 드롭다운 선택\n🟩 초록색 = 수시 업데이트</div></div>';
}

function loadData(force) {
  if (_data && !force) return Promise.resolve(_data);
  if (!GAS_URL) {
    _data = getDemoData();
    return Promise.resolve(_data);
  }
  return fetch(GAS_URL, {mode:'cors'})
    .then(function(r){ return r.json(); })
    .then(function(json){
      if (!json || (!json.kpi && !json.production)) throw new Error('invalid');
      _data = json;
      return _data;
    })
    .catch(function(){
      _data = getDemoData();
      return _data;
    });
}

function renderAll(d) {
  renderHome(d);
  renderProd(d);
  renderStats(d);
  renderGuide();
}

// ── 초기화 ────────────────────────────────────────────
function init() {
  document.getElementById('hdrDate').textContent =
    new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','/ ').replace('.','');
  renderGuide();
  loadData().then(renderAll);
}

// ── 탭 전환 ──────────────────────────────────────────
document.querySelectorAll('[data-p]').forEach(function(btn){
  btn.addEventListener('click', function(){
    var p = this.dataset.p;
    document.querySelectorAll('.panel').forEach(function(el){el.classList.remove('on')});
    document.querySelectorAll('[data-p]').forEach(function(el){el.classList.remove('on')});
    document.getElementById('p-'+p).classList.add('on');
    document.querySelectorAll('[data-p="'+p+'"]').forEach(function(el){el.classList.add('on')});
  });
});

// ── 새로고침 ─────────────────────────────────────────
document.getElementById('fabBtn').addEventListener('click', function(){
  _data = null;
  var btn = this;
  btn.style.transform='rotate(360deg)';btn.style.transition='transform .5s';
  setTimeout(function(){btn.style.transform='';btn.style.transition='';},500);
  document.getElementById('kpiGrid').innerHTML='<div class="loading" style="grid-column:span 2"><div class="spinner"></div>새로고침중</div>';
  loadData(true).then(renderAll);
});

// ── 모달 ─────────────────────────────────────────────
function showModal(){
  document.getElementById('modal').classList.add('show');
  var saved=''; try{saved=localStorage.getItem('odm_gas_url')||'';}catch(e){}
  document.getElementById('urlInput').value=saved;
  document.getElementById('urlStatus').textContent='';
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function saveUrl(){
  var url=document.getElementById('urlInput').value.trim();
  var st=document.getElementById('urlStatus');
  if(!url){st.textContent='❌ URL을 입력해 주세요';st.style.color='var(--red)';return;}
  if(!url.includes('script.google.com')){st.textContent='❌ Apps Script URL이 아닙니다';st.style.color='var(--red)';return;}
  st.textContent='🔄 연결 테스트 중...';st.style.color='var(--muted)';
  fetch(url,{mode:'cors'})
    .then(function(r){return r.json();})
    .then(function(json){
      try{localStorage.setItem('odm_gas_url',url);}catch(e){}
      GAS_URL=url;
      st.textContent='✅ 연결 성공! 데이터를 불러옵니다...';st.style.color='var(--green)';
      setTimeout(function(){
        closeModal();_data=null;
        loadData(true).then(renderAll);
      },1000);
    })
    .catch(function(){
      st.textContent='❌ 연결 실패 — GAS 배포 설정(액세스 권한)을 확인하세요';st.style.color='var(--red)';
    });
}

// ── 시작 ─────────────────────────────────────────────
init();
